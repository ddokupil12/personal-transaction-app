{% extends "base.html" %}

{% block title %}Add Category - Budget Manager{% endblock %}

{% block content %}
<div class="main-content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-plus me-2"></i>{{mode}} Category</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="id" value="{{category.categoryid if category else ''}}">
                        <div class="mb-3">
                            <label for="categoryname" class="form-label">Category Name</label>
                            <input type="text" class="form-control" id="categoryname" name="categoryname" maxlength="50" value="{{category.categoryname if category else ''}}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="type_" class="form-label">Category Type</label>
                            <select class="form-select" id="type_" name="type_" required>
                                <option value="">Select type...</option>
                                <option value="Income" {% if category and category.type_ == 'Income' %}selected{% endif %}>Income</option>
                                <option value="Expense" {% if category and category.type_ == 'Expense' %}selected{% endif %}>Expense</option>
                            </select>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Save Category
                            </button>
                            <a href="{{ url_for('category.categories') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                    {% if mode == 'Edit' %}
                        <br>
                        <div id="del_wrapper">
                            <div id="del_form" class="row" hidden>
                                <div class="col-md-6 mb-3">
                                    <h5>Are you sure?</h5>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <form method="POST" action="{{url_for('category.delete')}}">
                                        <input type="hidden" name="id" value="{{category.categoryid}}">
                                        <button type="submit" class="text-end btn btn-outline-secondary">Confirm Delete</button>
                                    </form>
                                </div>
                            </div>
                            <button onclick="del()" id="del" class="btn btn-outline-secondary">Delete</button>
                        </div>
                        <div>
                        </div>
                        <script>
                            'use strict';
                            const del = () => {
                                const btn = document.getElementById('del');
                                btn.hidden = true;
                                const form = document.getElementById('del_form');
                                form.hidden = false;
                            }
                            const cancel = () => {
                                const btn = document.getElementById('del');
                                btn.hidden = false;
                                const form = document.getElementById('del_form');
                                form.hidden = true;
                            }
                        </script>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
